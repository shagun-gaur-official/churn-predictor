<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Churn Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="min-h-screen bg-gray-50 py-10 px-4">
<div class="max-w-2xl mx-auto">

  <div class="mb-8">
    <h1 class="text-2xl font-semibold text-gray-800">Customer Churn Predictor</h1>
    <p class="text-sm text-gray-500 mt-1">Enter customer details to predict churn risk</p>
  </div>

  <div class="bg-white border border-gray-200 rounded-xl p-6 mb-6">
    <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Numeric details</p>
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Tenure (months)</label>
        <input id="tenure" type="number" value="12" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"/>
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Monthly charges</label>
        <input id="MonthlyCharges" type="number" value="65.5" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"/>
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Total charges</label>
        <input id="TotalCharges" type="number" value="786" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"/>
      </div>
    </div>

    <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Account info</p>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Contract</label>
        <select id="Contract" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option>Month-to-month</option><option>One year</option><option>Two year</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Internet service</label>
        <select id="InternetService" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option>Fiber optic</option><option>DSL</option><option>No</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Payment method</label>
        <select id="PaymentMethod" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option>Electronic check</option><option>Mailed check</option>
          <option>Bank transfer (automatic)</option><option>Credit card (automatic)</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Gender</label>
        <select id="gender" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option>Male</option><option>Female</option>
        </select>
      </div>
    </div>

    <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Services (1=Yes, 0=No)</p>
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div><label class="block text-xs text-gray-500 mb-1">SeniorCitizen</label>
        <select id="SeniorCitizen" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">Partner</label>
        <select id="Partner" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">Dependents</label>
        <select id="Dependents" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">PhoneService</label>
        <select id="PhoneService" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="1">1 - Yes</option><option value="0">0 - No</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">MultipleLines</label>
        <select id="MultipleLines" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">OnlineSecurity</label>
        <select id="OnlineSecurity" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">OnlineBackup</label>
        <select id="OnlineBackup" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">DeviceProtection</label>
        <select id="DeviceProtection" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">TechSupport</label>
        <select id="TechSupport" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="0">0 - No</option><option value="1">1 - Yes</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">StreamingTV</label>
        <select id="StreamingTV" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="1">1 - Yes</option><option value="0">0 - No</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">StreamingMovies</label>
        <select id="StreamingMovies" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="1">1 - Yes</option><option value="0">0 - No</option></select></div>
      <div><label class="block text-xs text-gray-500 mb-1">PaperlessBilling</label>
        <select id="PaperlessBilling" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"><option value="1">1 - Yes</option><option value="0">0 - No</option></select></div>
    </div>

    <button id="predict-btn" onclick="runPredict()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition">
      Predict churn risk
    </button>
  </div>

  <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 mb-6"></div>

  <div id="result-card" class="hidden bg-white border border-gray-200 rounded-xl p-6">
    <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Prediction result</p>
    <div class="flex items-center gap-3 mb-5">
      <span id="risk-badge" class="px-4 py-1.5 rounded-lg text-sm font-medium border"></span>
      <span class="text-sm text-gray-500">Prediction: <strong id="prediction-label" class="text-gray-700"></strong></span>
    </div>
    <div class="mb-2 flex justify-between text-xs text-gray-500">
      <span>Churn probability</span><span id="prob-label"></span>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-2.5 mb-6">
      <div id="prob-bar" class="h-2.5 rounded-full transition-all duration-700" style="width:0%"></div>
    </div>
    <p class="text-xs text-gray-400">Model: XGBoost · API: FastAPI · Deployed on Render</p>
  </div>

</div>

<script>
function runPredict() {
  var btn = document.getElementById('predict-btn');
  var errorBox = document.getElementById('error-box');
  var resultCard = document.getElementById('result-card');

  btn.textContent = 'Predicting...';
  btn.disabled = true;
  errorBox.classList.add('hidden');
  resultCard.classList.add('hidden');

  var data = {
    tenure:           Number(document.getElementById('tenure').value),
    MonthlyCharges:   Number(document.getElementById('MonthlyCharges').value),
    TotalCharges:     Number(document.getElementById('TotalCharges').value),
    Contract:         document.getElementById('Contract').value,
    InternetService:  document.getElementById('InternetService').value,
    PaymentMethod:    document.getElementById('PaymentMethod').value,
    gender:           document.getElementById('gender').value,
    SeniorCitizen:    Number(document.getElementById('SeniorCitizen').value),
    Partner:          Number(document.getElementById('Partner').value),
    Dependents:       Number(document.getElementById('Dependents').value),
    PhoneService:     Number(document.getElementById('PhoneService').value),
    MultipleLines:    Number(document.getElementById('MultipleLines').value),
    OnlineSecurity:   Number(document.getElementById('OnlineSecurity').value),
    OnlineBackup:     Number(document.getElementById('OnlineBackup').value),
    DeviceProtection: Number(document.getElementById('DeviceProtection').value),
    TechSupport:      Number(document.getElementById('TechSupport').value),
    StreamingTV:      Number(document.getElementById('StreamingTV').value),
    StreamingMovies:  Number(document.getElementById('StreamingMovies').value),
    PaperlessBilling: Number(document.getElementById('PaperlessBilling').value)
  };

  axios.post('https://churn-predictor-api-k8ed.onrender.com/predict', data)
    .then(function(res) {
      var r = res.data;
      var riskColors = {
        High:   'bg-red-100 text-red-700 border-red-300',
        Medium: 'bg-yellow-100 text-yellow-700 border-yellow-300',
        Low:    'bg-green-100 text-green-700 border-green-300'
      };
      var barColors = {
        High:   'bg-red-500',
        Medium: 'bg-yellow-400',
        Low:    'bg-green-500'
      };
      document.getElementById('risk-badge').className = 'px-4 py-1.5 rounded-lg text-sm font-medium border ' + riskColors[r.risk_level];
      document.getElementById('risk-badge').textContent = r.risk_level + ' churn risk';
      document.getElementById('prediction-label').textContent = r.prediction;
      document.getElementById('prob-label').textContent = (r.probability * 100).toFixed(1) + '%';
      var bar = document.getElementById('prob-bar');
      bar.className = 'h-2.5 rounded-full transition-all duration-700 ' + barColors[r.risk_level];
      setTimeout(function() { bar.style.width = (r.probability * 100).toFixed(1) + '%'; }, 100);
      resultCard.classList.remove('hidden');
      btn.textContent = 'Predict churn risk';
      btn.disabled = false;
    })
    .catch(function(err) {
      errorBox.textContent = 'Could not reach the API. Try again in 30 seconds — free server may be waking up.';
      errorBox.classList.remove('hidden');
      btn.textContent = 'Predict churn risk';
      btn.disabled = false;
    });
}
</script>
</body>
</html>
